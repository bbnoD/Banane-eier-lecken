<style>
   
    .random-wrapper-bw {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        font-family: 'Arial Black', sans-serif;
        overflow: hidden;
        position: relative;
    }

    .spruch-container {
        text-align: center;
        line-height: 0.85;
    }

    .wort-bw {
        font-size: 15vw;
        font-weight: 900;
        text-transform: uppercase;
        display: block;
        margin: 0;
        color: #000;
    }

    .social-links-bw {
        margin-top: 20px;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        gap: 20px;
        z-index: 10;
    }

    .social-links-bw a {
        color: #000;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.2rem;
        border-bottom: 2px solid transparent;
        transition: border-bottom 0.2s;
    }

   
    .footer-bw-button {
        position: absolute;
        bottom: 30px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        border: 2px solid #000;
        padding: 5px 15px;
        transform: rotate(-2deg);
        color: #000;
        text-decoration: none; 
        transition: all 0.2s ease-in-out;
        display: inline-block;
        cursor: pointer;
    }

    
    .footer-bw-button:hover {
        background-color: #000;
        color: #fff;
        transform: rotate(0deg) scale(1.05); 
    }

    @media (max-width: 768px) {
        .wort-bw { font-size: 20vw; }
        .social-links-bw { gap: 15px; }
        .social-links-bw a { font-size: 1rem; }
    }
</style>

<div class="random-wrapper-bw">
    <div class="spruch-container">
        <span class="wort-bw">EIER</span>
        <span class="wort-bw">LECKEN</span>
    </div>

 

    <a href="links.html" class="footer-bw-button">
        © ALLE RECHTE VORBEHALTEN LG Banane
    </a>
</div>
