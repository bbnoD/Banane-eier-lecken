<style>
    @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel&display=swap');

   
    .wrapper-gold {
        --gold-gradient: linear-gradient(45deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 100%);
        --border-color: #aa771c;
        
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background-color: #000 !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        margin: 0 !important;
        padding: 0 !important;
        z-index: 99999 !important;
        box-sizing: border-box !important;
    }

    .gold-border-bg {
        position: absolute !important;
        top: 20px !important;
        left: 20px !important;
        right: 20px !important;
        bottom: 20px !important;
        border: 2px solid var(--border-color) !important;
        outline: 1px solid var(--border-color) !important;
        outline-offset: -15px !important;
        pointer-events: none !important;
        z-index: 1 !important;
    }

    .content-gold {
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        text-align: center !important;
        width: 100% !important;
        z-index: 10 !important;
    }

    .wort-gold {
        font-family: 'Alex Brush', cursive !important;
        font-size: 15vw !important;
        line-height: 0.8 !important;
        display: block !important;
        background: var(--gold-gradient) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        margin: 0 !important;
    }

    .footer-gold {
        position: absolute !important;
        bottom: 40px !important; 
        left: 0 !important;
        width: 100% !important;
        display: flex !important;
        justify-content: center !important;
        z-index: 20 !important;
    }

    .copyright-button {
        font-family: 'Cinzel', serif !important;
        color: #444 !important;
        text-transform: uppercase !important;
        letter-spacing: 5px !important;
        font-size: 0.8rem !important;
        text-decoration: none !important;
        border: 1px solid transparent !important;
        padding: 10px 20px !important;
        background: transparent !important;
        display: inline-block !important; 
        cursor: pointer !important;
    }

    .copyright-button:hover {
        color: #bf953f !important;
        border-color: #bf953f !important;
    }

    @media (max-width: 768px) {
        .wort-gold { font-size: 22vw !important; }
    }
</style>
