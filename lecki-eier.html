<style>
    
    .wrapper-egg {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        background-color: #121212; 
        color: #E0E0E0;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden !important;
        z-index: 99999 !important;
    }

 
    .spruch-egg {
        font-size: 6rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #FFD700; 
        margin-bottom: 50px;
        text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        text-align: center;
        padding: 0 20px;
        z-index: 10;
    }


    .ei-container {
        font-size: 15rem;
        cursor: pointer;
        position: relative;
        z-index: 10;
     
        animation: 
            wackeln-egg 1s infinite ease-in-out alternate,
            huepfen-egg 2s infinite ease-in-out;
        -webkit-user-select: none;
        user-select: none;
        transition: filter 0.3s ease;
    }

    .ei-container:hover {
        filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
    }

    @keyframes wackeln-egg {
        0% { transform: rotate(-5deg); }
        100% { transform: rotate(5deg); }
    }

    @keyframes huepfen-egg {
        0%, 100% { margin-top: 0; }
        50% { margin-top: -30px; }
    }

    .footer-egg {
        position: absolute !important;
        bottom: 30px !important;
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 20;
    }

   
    .footer-button-egg {
        color: #555;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 2px;
        border-top: 1px solid #333;
        padding-top: 10px;
        padding-left: 20px;
        padding-right: 20px;
        transition: all 0.3s ease;
        background: transparent;
        border-left: none;
        border-right: none;
        border-bottom: none;
        cursor: pointer;
    }

    .footer-button-egg:hover {
        color: #FFD700;
        border-top-color: #FFD700;
        text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
    }

    @media (max-width: 600px) {
        .spruch-egg { font-size: 3rem; }
        .ei-container { font-size: 10rem; }
    }
</style>

<div class="wrapper-egg">
    <div class="spruch-egg">
        Eier lecken
    </div>

    <div class="ei-container" title="Es wackelt...">
        🥚
    </div>

    <footer class="footer-egg">
        <a href="links.html" class="footer-button-egg">
            © 2026 Alle Rechte vorbehalten LG Banane
        </a>
    </footer>
</div>
