<style>
    
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

  
    .wrapper-flip {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background-color: #0d0e10;
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-between !important;
        align-items: center !important;
        font-family: 'Arial Black', sans-serif;
        margin: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
        z-index: 99999 !important;
        overflow: hidden !important;
        perspective: 1000px;
    }

    .massive-board {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
    }

    .board-content {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .row-flip {
        display: flex;
        gap: 8px;
    }

   
    .flap {
        position: relative;
        background-color: #1a1d21;
        width: 10vw;
        height: 16vh;
        border-radius: 6px;
        border: 1px solid #000;
        box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        animation: mechanical-flip 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95) both;
        transform-origin: center;
    }

    .letter-flip {
        color: #d1d9e1;
        font-size: 12vh;
        font-weight: 900;
        text-transform: uppercase;
        z-index: 1;
        pointer-events: none;
    }

  
    .flap::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(0,0,0,0.8);
        z-index: 5;
        box-shadow: 0 1px 1px rgba(255,255,255,0.05);
    }

  
    @keyframes mechanical-flip {
        0% { 
            transform: rotateX(-90deg); 
            filter: brightness(0.4);
            box-shadow: 0 0 0 rgba(0,0,0,0);
        }
        50% {
            filter: brightness(1.3);
        }
        100% { 
            transform: rotateX(0deg); 
            filter: brightness(1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
    }

   
    .row-flip:nth-child(1) .flap:nth-child(1) { animation-delay: 0.1s; }
    .row-flip:nth-child(1) .flap:nth-child(2) { animation-delay: 0.2s; }
    .row-flip:nth-child(1) .flap:nth-child(3) { animation-delay: 0.3s; }
    .row-flip:nth-child(1) .flap:nth-child(4) { animation-delay: 0.4s; }
    .row-flip:nth-child(1) .flap:nth-child(5) { animation-delay: 0.5s; }
    .row-flip:nth-child(1) .flap:nth-child(6) { animation-delay: 0.6s; }

    .row-flip:nth-child(2) .flap:nth-child(1) { animation-delay: 0.7s; }
    .row-flip:nth-child(2) .flap:nth-child(2) { animation-delay: 0.8s; }
    .row-flip:nth-child(2) .flap:nth-child(3) { animation-delay: 0.9s; }
    .row-flip:nth-child(2) .flap:nth-child(4) { animation-delay: 1.0s; }
    .row-flip:nth-child(2) .flap:nth-child(5) { animation-delay: 1.1s; }
    .row-flip:nth-child(2) .flap:nth-child(6) { animation-delay: 1.2s; }

   
    .footer-spalt-flip {
        width: 100% !important;
        height: 80px !important;
        background-color: #15171a !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        border-top: 2px solid #2a2f35 !important;
        z-index: 100 !important;
    }

    .copyright-button-flip {
        color: #4a535d !important;
        text-transform: uppercase !important;
        font-size: 0.8rem !important;
        letter-spacing: 4px !important;
        text-decoration: none !important;
        padding: 12px 30px !important;
        border: 1px solid transparent !important;
        transition: all 0.3s ease !important;
        cursor: pointer !important;
        background: transparent !important;
        display: inline-block !important;
    }

    .copyright-button-flip:hover {
        color: #d1d9e1 !important;
        border-color: #4a535d !important;
        background-color: rgba(255,255,255,0.02) !important;
        letter-spacing: 5px !important;
    }

    @media (max-width: 768px) {
        .flap { width: 14vw; height: 12vh; }
        .letter-flip { font-size: 8vh; }
        .row-flip { gap: 5px; }
    }
</style>

<div class="wrapper-flip">
    <div class="massive-board">
        <div class="board-content">
            
            <div class="row-flip">
                <div class="flap"><span class="letter-flip">&nbsp;</span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">I</span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">R</span></div>
                <div class="flap"><span class="letter-flip">&nbsp;</span></div>
            </div>
            
            <div class="row-flip">
                <div class="flap"><span class="letter-flip">L</span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">C</span></div>
                <div class="flap"><span class="letter-flip">K</span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">N</span></div>
            </div>

        </div>
    </div>

    <footer class="footer-spalt-flip">
        <a href="links.html" class="copyright-button-flip">
            © 2026 Alle Rechte vorbehalten LG Banane
        </a>
    </footer>
</div>
