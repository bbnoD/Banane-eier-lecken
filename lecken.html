<style>
    .wrapper-flip {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        background-color: #0d0e10; /* Sehr dunkles Schwarz-Blau */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
        font-family: 'Arial Black', sans-serif;
        position: relative;
    }

    /* Der massive Flip-Board-Bereich */
    .massive-board {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* Container für die Reihen */
    .board-content {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
    }

    /* Eine Reihe (Wort) */
    .row-flip {
        display: flex;
        gap: 10px;
    }

    /* Die einzelne Flip-Kachel */
    .flap {
        position: relative;
        background-color: #1a1d21;
        width: 12vw; /* Leicht angepasst für bessere Lesbarkeit im Container */
        height: 20vh;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        border: 2px solid #2a3036;
    }

    /* Der Buchstabe innerhalb der Kachel */
    .letter-flip {
        text-transform: uppercase;
        color: #d1d9e1;
        font-weight: 900;
        font-size: 15vh;
        margin: 0;
        line-height: 1;
    }

    /* Die mechanische Trennlinie */
    .flap::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 3px;
        background-color: rgba(0,0,0,0.4);
        z-index: 2;
        transform: translateY(-50%);
    }

    /* Der untere Spalt */
    .footer-spalt-flip {
        height: 60px;
        background-color: #1a1d21;
        display: flex;
        justify-content: center;
        align-items: center;
        border-top: 2px solid #2a2f35;
        position: relative;
        z-index: 10;
    }

    .rechte-flip {
        color: #6a737d;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 2px;
    }

    /* Responsive Anpassung */
    @media (max-width: 768px) {
        .flap {
            width: 18vw;
            height: 12vh;
        }
        .letter-flip {
            font-size: 9vh;
        }
        .row-flip {
            gap: 5px;
        }
    }
</style>

<div class="wrapper-flip">
    <div class="massive-board">
        <div class="board-content">
            
            <div class="row-flip">
                <div class="flap"><span class="letter-flip"></span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">I</span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">R</span></div>
                <div class="flap"><span class="letter-flip"></span></div>
            </div>
            
            <div class="row-flip">
                <div class="flap"><span class="letter-flip">L</span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">C</span></div>
                <div class="flap"><span class="letter-flip">K</span></div>
                <div class="flap"><span class="letter-flip">E</span></div>
                <div class="flap"><span class="letter-flip">N</span></div>
            </div>

        </div>
    </div>

    <div class="footer-spalt-flip">
        <div class="rechte-flip">© Alle Rechte vorbehalten LG</div>
    </div>
</div>
