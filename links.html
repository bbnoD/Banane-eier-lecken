<style>

    .link-page-wrapper {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #ffffff;
        font-family: 'Arial Black', sans-serif;
        padding-top: 50px;
        padding-bottom: 100px;
        box-sizing: border-box;
    }

  
    .header-container {
        text-align: center;
        line-height: 0.85;
        margin-bottom: 40px;
    }

    .header-title {
        font-size: 12vw;
        font-weight: 900;
        text-transform: uppercase;
        display: block;
        color: #000;
    }

    
    .links-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 90%;
        max-width: 500px;
    }

  
    .link-item {
        font-family: 'Courier New', Courier, monospace;
        font-size: 1.2rem;
        font-weight: bold;
        text-align: center;
        text-transform: uppercase;
        text-decoration: none;
        color: #000;
        border: 3px solid #000;
        padding: 15px;
        transition: all 0.2s ease;
        display: block;
    }

    .link-item:hover {
        background-color: #000;
        color: #fff;
        transform: translate(-4px, -4px);
        box-shadow: 6px 6px 0px #ccc;
    }

    .footer-stamp {
        position: fixed;
        bottom: 30px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        border: 2px solid #000;
        padding: 5px 15px;
        transform: rotate(-2deg);
        color: #000;
        text-decoration: none;
        background: #fff;
        transition: all 0.2s ease;
    }

    .footer-stamp:hover {
        transform: rotate(0deg) scale(1.1);
        background: #000;
        color: #fff;
    }

    /* Mobile Anpassung */
    @media (max-width: 768px) {
        .header-title { font-size: 18vw; }
        .link-item { font-size: 1rem; }
    }
</style>

<div class="link-page-wrapper">
    <div class="header-container">
        <span class="header-title">MEINE</span>
        <span class="header-title">EIER</span>
    </div>

    <div class="links-list">
        <a href="https://instagram.com/deinname" class="link-item" target="_blank">Instagram</a>
        <a href="https://tiktok.com/@deinname" class="link-item" target="_blank">TikTok</a>
        <a href="https://youtube.com/c/deinkanal" class="link-item" target="_blank">YouTube</a>
        <a href="https://twitter.com/deinname" class="link-item" target="_blank">Twitter / X</a>
        <a href="mailto:hallo@deinedomain.de" class="link-item">Kontakt</a>
    </div>

    <a href="https://eier-lecken.de/" class="footer-stamp">
        © ALLE RECHTE VORBEHALTEN LG
    </a>
</div>
