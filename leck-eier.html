<style>
    @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel&display=swap');

    
    .wrapper-gold {
        --gold-gradient: linear-gradient(45deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 100%);
        --border-color: #aa771c;
        
        position: fixed; 
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        z-index: 9999; 
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .gold-border-bg {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        bottom: 20px;
        border: 2px solid var(--border-color);
        outline: 1px solid var(--border-color);
        outline-offset: -15px;
        pointer-events: none;
        z-index: 1;
    }

    .content-gold {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
    }

    .wort-gold {
        font-family: 'Alex Brush', cursive;
        font-size: 15vw;
        display: block;
        margin: -2vh 0;
        background: var(--gold-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        line-height: 1;
    }

    .footer-gold {
        width: 100%;
        padding-bottom: 40px;
        display: flex;
        justify-content: center;
        z-index: 20;
    }

    .copyright-button {
        font-family: 'Cinzel', serif;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 5px;
        font-size: 0.8rem;
        text-decoration: none;
        border: 1px solid transparent;
        padding: 10px 20px;
        transition: all 0.4s ease;
        background: transparent;
        display: inline-block;
        outline: none !important;
        -webkit-tap-highlight-color: transparent;
    }

    .copyright-button:hover {
        color: #bf953f;
        border-color: #bf953f;
    }

    @media (max-width: 768px) {
        .wort-gold { font-size: 20vw; }
    }
</style>

<div class="wrapper-gold">
    <div class="gold-border-bg"></div>

    <div class="content-gold">
        <span class="wort-gold">Eier</span>
        <span class="wort-gold">Lecken</span>
    </div>

    <footer class="footer-gold">
        <a href="links.html" class="copyright-button">
            © 2026 Alle Rechte vorbehalten LG Banane
        </a>
    </footer>
</div>
