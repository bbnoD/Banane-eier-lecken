<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eier-lecken.de | Official</title>
    <style>
       
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .random-wrapper {
            width: 100%;
            height: 100vh;
            background-color: #050505;
            background-image: radial-gradient(circle at center, #151515 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
        }

     
        .text-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.2;
        }

        
        .wort {
            font-size: 15vw;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: transparent;
            -webkit-text-stroke: 2px #00ffff;
            animation: pulse-cyan 2s infinite alternate;
        }

       
        .wort:nth-child(2) {
            -webkit-text-stroke: 2px #ff00ff;
            animation: pulse-magenta 2.5s infinite alternate;
        }

        @keyframes pulse-cyan {
            0% { text-shadow: 0 0 10px rgba(0, 255, 255, 0.2); }
            100% { text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.5); }
        }

        @keyframes pulse-magenta {
            0% { text-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }
            100% { text-shadow: 0 0 20px rgba(255, 0, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.5); }
        }

        .footer {
            margin-bottom: 40px;
            width: 80%;
            text-align: center;
            z-index: 10;
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
        }

        .rights-button {
            background: transparent;
            border: 1px solid #333;
            color: #444;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            padding: 10px 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .rights-button:hover {
            color: #ff00ff;
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            background: rgba(255, 0, 255, 0.05);
        }

        .rights-button:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .wort { font-size: 20vw; }
        }
    </style>
</head>
<body>

<div class="random-wrapper">
    <div class="text-container">
        <span class="wort">EIER</span>
        <span class="wort">LECKEN</span>
    </div>

    <div class="footer">
        <a href="links.html">
        <button class="rights-button">
            © 2026 Alle Rechte vorbehalten LG Banane
            
        </button></a>
    </div>
</div>

</body>
</html>
